<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <style>
    html, body { margin: 0; height: 100%; background: transparent; overflow: hidden; }
    #bubble {
      width: 64px; height: 64px; margin: 4px;
      border-radius: 50%;
      background: rgba(22, 22, 27, 0.60);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; user-select: none;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.12), 0 2px 10px rgba(0, 0, 0, 0.25);
      transition: transform .15s steps(2), background .2s;
    }
    #bubble:hover { background: rgba(22, 22, 27, 0.78); transform: scale(1.05); }
    #bubble:active { transform: scale(0.95); }
    canvas { image-rendering: pixelated; width: 42px; height: 42px; animation: bob 2.4s steps(2) infinite; }
    @keyframes bob { 50% { transform: translateY(-2px); } }
  </style>
</head>
<body>
  <div id="bubble" title="vibebuddy — click to open">
    <canvas id="pet" width="64" height="64"></canvas>
  </div>
  <script>
    // the brand mark v2 — a speech bubble holding a heart. the app, not anybody's pet.
    function drawMark() {
      const g = Array.from({ length: 16 }, () => Array(16).fill(null));
      const set = (x, y, c) => { if (x >= 0 && x < 16 && y >= 0 && y < 16) g[y][x] = c; };
      const body = '#f2ede2', shade = '#d9d2c2', line = '#26262b', heart = '#d85a30', spark = '#f5c542';
      const ROWS = { 2: [4, 11], 3: [3, 12], 4: [2, 13], 5: [2, 13], 6: [2, 13], 7: [2, 13], 8: [2, 13], 9: [3, 12], 10: [4, 11] };
      for (const [yStr, [a, b]] of Object.entries(ROWS)) {
        const y = Number(yStr);
        for (let x = a; x <= b; x++) set(x, y, x >= b - 1 || y >= 9 ? shade : body);
        set(a - 1, y, line); set(b + 1, y, line);
      }
      for (let x = 4; x <= 11; x++) set(x, 1, line);
      for (let x = 4; x <= 11; x++) set(x, 11, x === 5 || x === 6 ? shade : line);
      set(5, 12, line); set(6, 12, shade); set(7, 12, line);
      set(4, 13, line); set(5, 13, shade); set(6, 13, line);
      set(4, 14, line); set(5, 14, line);
      set(5, 4, heart); set(6, 4, heart); set(9, 4, heart); set(10, 4, heart);
      for (let x = 5; x <= 10; x++) set(x, 5, heart);
      for (let x = 5; x <= 10; x++) set(x, 6, heart);
      for (let x = 6; x <= 9; x++) set(x, 7, heart);
      set(7, 8, heart); set(8, 8, heart);
      set(13, 1, spark); set(12, 2, spark); set(14, 2, spark); set(13, 3, spark);
      const ctx = document.getElementById('pet').getContext('2d');
      ctx.clearRect(0, 0, 64, 64);
      for (let y = 0; y < 16; y++) for (let x = 0; x < 16; x++) {
        if (!g[y][x]) continue;
        ctx.fillStyle = g[y][x];
        ctx.fillRect(x * 4, y * 4, 4, 4);
      }
    }
    drawMark();

    // left-click toggles the panel; drag moves the bubble; right-click opens the native menu
    const el = document.getElementById('bubble');
    const invoke = window.__TAURI__.core.invoke;
    const getWin = window.__TAURI__.window.getCurrentWindow;
    let down = null, dragged = false;
    el.addEventListener('pointerdown', (e) => {
      if (e.button !== 0) return;
      down = { x: e.screenX, y: e.screenY };
      dragged = false;
    });
    el.addEventListener('pointermove', (e) => {
      if (down && !dragged && (Math.abs(e.screenX - down.x) > 6 || Math.abs(e.screenY - down.y) > 6)) {
        dragged = true;
        getWin().startDragging();
      }
    });
    el.addEventListener('pointerup', (e) => {
      if (e.button !== 0) return;
      if (down && !dragged) invoke('toggle_panel');
      down = null;
    });
    window.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      invoke('bubble_menu');
    });
  </script>
</body>
</html>
