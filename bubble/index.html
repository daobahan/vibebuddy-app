<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <style>
    html, body { margin: 0; height: 100%; background: transparent; overflow: hidden; }
    #bubble {
      width: 64px; height: 64px; margin: 4px;
      border-radius: 50%;
      background: rgba(22, 22, 27, 0.60);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; user-select: none;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.12), 0 2px 10px rgba(0, 0, 0, 0.25);
      transition: transform .15s steps(2), background .2s;
    }
    #bubble:hover { background: rgba(22, 22, 27, 0.78); transform: scale(1.05); }
    #bubble:active { transform: scale(0.95); }
    canvas { image-rendering: pixelated; width: 42px; height: 42px; animation: bob 2.4s steps(2) infinite; }
    @keyframes bob { 50% { transform: translateY(-2px); } }
  </style>
</head>
<body>
  <div id="bubble" title="vibebuddy — click to open">
    <canvas id="pet" width="64" height="64"></canvas>
  </div>
  <script>
    // the brand mark v4 — the living dot (generated from web/src/brand.js — keep in sync)
    function drawMark() {
      const g = [[null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null],[null,null,null,null,null,null,null,null,null,null,null,null,null,"#f5c542",null,null],[null,null,null,null,null,null,null,null,null,null,null,null,"#f5c542","#fff3c4","#f5c542",null],[null,null,null,null,null,"#63e6a5","#63e6a5","#35d07f","#35d07f","#35d07f","#35d07f",null,null,"#f5c542",null,null],[null,null,null,null,"#63e6a5","#63e6a5","#35d07f","#35d07f","#35d07f","#35d07f","#35d07f","#1d9e75",null,null,null,null],[null,null,null,"#63e6a5","#63e6a5","#35d07f","#35d07f","#35d07f","#35d07f","#35d07f","#35d07f","#35d07f","#35d07f",null,null,null],[null,null,null,"#35d07f","#35d07f","#dfe8ff","#10131c","#35d07f","#35d07f","#dfe8ff","#10131c","#35d07f","#35d07f",null,null,null],[null,null,null,"#35d07f","#35d07f","#10131c","#10131c","#35d07f","#35d07f","#10131c","#10131c","#35d07f","#35d07f",null,null,null],[null,null,null,"#35d07f","#35d07f","#35d07f","#35d07f","#35d07f","#35d07f","#35d07f","#35d07f","#35d07f","#35d07f",null,null,null],[null,null,null,"#35d07f","#35d07f","#35d07f","#35d07f","#10131c","#10131c","#35d07f","#35d07f","#35d07f","#1d9e75",null,null,null],[null,null,null,"#35d07f","#35d07f","#35d07f","#35d07f","#35d07f","#35d07f","#35d07f","#35d07f","#35d07f","#1d9e75",null,null,null],[null,null,null,null,"#35d07f","#35d07f","#35d07f","#35d07f","#35d07f","#35d07f","#1d9e75","#1d9e75",null,null,null,null],[null,null,null,null,null,"#1d9e75","#1d9e75","#1d9e75","#1d9e75","#1d9e75","#1d9e75",null,null,null,null,null],[null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null],[null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null],[null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null]];
      const ctx = document.getElementById('pet').getContext('2d');
      ctx.clearRect(0, 0, 64, 64);
      for (let y = 0; y < 16; y++) for (let x = 0; x < 16; x++) {
        if (!g[y][x]) continue;
        ctx.fillStyle = g[y][x];
        ctx.fillRect(x * 4, y * 4, 4, 4);
      }
    }
    drawMark();

    // left-click toggles the panel; drag moves the bubble; right-click opens the native menu
    const el = document.getElementById('bubble');
    const invoke = window.__TAURI__.core.invoke;
    const getWin = window.__TAURI__.window.getCurrentWindow;
    let down = null, dragged = false;
    el.addEventListener('pointerdown', (e) => {
      if (e.button !== 0) return;
      down = { x: e.screenX, y: e.screenY };
      dragged = false;
    });
    el.addEventListener('pointermove', (e) => {
      if (down && !dragged && (Math.abs(e.screenX - down.x) > 6 || Math.abs(e.screenY - down.y) > 6)) {
        dragged = true;
        getWin().startDragging();
      }
    });
    el.addEventListener('pointerup', (e) => {
      if (e.button !== 0) return;
      if (down && !dragged) invoke('toggle_panel');
      down = null;
    });
    window.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      invoke('bubble_menu');
    });
  </script>
</body>
</html>
